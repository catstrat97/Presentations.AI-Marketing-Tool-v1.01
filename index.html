<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative Canvas · Curve-Driven Composition</title>
  <meta name="description"
    content="A modular, curve-driven generative canvas system built with p5.js. Control symmetrical rectangle compositions with live GUI parameters." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="app">

    <!-- ── Canvas Viewport ──────────────────────────────────── -->
    <div id="canvas-wrap">
      <div id="artboard">
        <div id="p5-target">
          <!-- p5.js injects its canvas here -->
        </div>
        <div id="overlays" style="display: none;"> <!-- Shown when DOM is ready -->
          <div id="overlay-headline" class="overlay-layer">
            <div id="headline-text" class="headline-text"></div>
          </div>
          <div id="overlay-image" class="overlay-layer">
            <div id="image-placeholder-inner">
              <img id="uploaded-image" style="display:none;" />
              <svg id="placeholder-icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
              </svg>
            </div>
          </div>
          <div id="overlay-footer" class="overlay-layer">
            <div id="footer-byline">Start for free today</div>
            <div class="footer-logo-wrap">
              <img src="img/pai-wordmark.svg" class="pai-logo" alt="presentations.ai" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Control Panel ────────────────────────────────────── -->
    <aside id="panel" class="ignore-export">

      <div id="panel-scroll">
        <!-- Sections injected by gui.js after DOM ready -->
      </div>

      <div id="panel-footer">
        <button class="btn" id="btn-random" title="Randomize all parameters">⚄ Random</button>
        <button class="btn primary" id="btn-export" title="Export canvas as PNG">↓ Export PNG</button>
      </div>

    </aside>

  </div>

  <!-- ── Vendor CDN scripts (classic, attach globals) ─────── -->
  <!-- Must load before our modules so p5 / Tweakpane / JSZip /     -->
  <!-- html2canvas globals exist when the module code runs.          -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.10/dist/tweakpane.js"></script>

  <!-- ── App modules (ES modules, deferred by default) ────── -->
  <!-- gui.js imports sketch.js (transitively via window hooks) -->
  <!-- and shared.js. Module load order is resolved by imports. -->
  <script type="module" src="sketch.js"></script>
  <script type="module" src="gui.js"></script>

  <!-- Window resize handler — classic OK; module sets window._p5Resize -->
  <!-- before any user-driven resize fires. -->
  <script>
    let _rt;
    window.addEventListener('resize', () => {
      clearTimeout(_rt);
      _rt = setTimeout(() => { if (window._p5Resize) window._p5Resize(); }, 120);
    });
  </script>

</body>

</html>
